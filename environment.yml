name: diffuse_vine_cop
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10
  
  # Core PyTorch with CUDA support
  - pytorch::pytorch>=2.1.0
  - pytorch::torchvision>=0.16.0
  - pytorch::torchaudio>=2.1.0
  - pytorch::pytorch-cuda=12.1
  
  # Numerical computing
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  
  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  
  # Data handling
  - h5py>=3.8.0
  - pyyaml>=6.0
  
  # Development tools
  - pip>=23.0
  - setuptools>=68.0
  - wheel>=0.40.0
  
  # Jupyter (optional but useful)
  - jupyter>=1.0.0
  - ipython>=8.12.0
  - notebook>=7.0.0
  
  # Testing
  - pytest>=7.4.0
  - pytest-cov>=4.1.0
  
  # Progress bars and CLI
  - tqdm>=4.65.0
  
  # Additional dependencies via pip
  - pip:
    # Copula library (not available via conda)
    - pyvinecopulib>=0.7.5
    # Alternative Python copula toolkit (includes a VineCopula implementation; optional baseline)
    - copulas>=0.13.0
    # kNN mutual-information estimator (KSG-style), used for literature-friendly MI comparisons
    - ennemi>=1.4.0
    # MINDE baseline (uses PyTorch Lightning)
    - pytorch-lightning>=2.1.0
    
    # Configuration management
    - hydra-core>=1.3.0
    - omegaconf>=2.3.0
    
    # CLI tools
    - typer[all]>=0.9.0
    - rich>=13.0.0
    - click>=8.1.0
    
    # Logging and monitoring
    - tensorboard>=2.13.0
    - wandb>=0.15.0
    
    # Diffusion models (optional)
    - diffusers>=0.21.0
    
    # Testing frameworks
    - hypothesis>=6.75.0
    
    # Code quality (optional)
    - ruff>=0.0.270
    - black>=23.3.0
    
    # Install local package in editable mode
    - -e .
