# Training configuration for 4 GPUs (budget option)
# Takes ~24 days but works if you have 4 GPUs available

model:
  m: 64
  in_channels: 1
  base_channels: 128         # Same 50M params
  channel_mults: [1, 2, 3, 4]
  num_res_blocks: 3
  attention_resolutions: [16, 8]
  dropout: 0.1
  time_emb_dim: 256

data:
  train_roots:
    - data/train/single_family
    - data/train/mixtures_2comp
    - data/train/mixtures_3comp
    - data/train/mixtures_4_5comp
    - data/train/vine_cond_3d
    - data/train/vine_cond_5d
    - data/train/hard_examples
  
  sample_weights: [0.05, 0.15, 0.30, 0.15, 0.15, 0.10, 0.10]
  val_root: data/val
  
  batch_size: 64              # Per GPU (same as 16 GPU config)
  val_batch_size: 128
  num_workers: 8
  
  reflect: true
  smooth_sigma: null
  shuffle_buffer_size: 5000
  cache_size: 1000
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  infinite: true

diffusion:
  timesteps: 1000
  beta_schedule: cosine
  beta_start: 1.0e-4
  beta_end: 0.02
  prediction_type: noise

training:
  max_steps: 3000000          # 4× more steps (to cover same data)
  grad_accum_steps: 8         # 2× more accumulation
                              # Effective batch: 64 × 4 × 8 = 2,048
  
  use_amp: true
  amp_dtype: float16
  max_grad_norm: 1.0
  
  loss_weights:
    nll: 1.0
    ise: 1.0
    marginal: 0.15
    tail: 0.5
    mixture_kl: 0.1
    density_reg: 0.01
  
  projection_iters: 20
  projection_tol: 1.0e-4
  projection_schedule:
    start_step: 0
    end_step: 100000
    start_weight: 0.5
    end_weight: 1.0
  
  log_every: 100
  val_every: 10000            # Less frequent validation (save time)
  save_every: 20000           # Less frequent saves
  
  use_ema: true
  ema_decay: 0.9999

optimizer:
  type: adamw
  lr: 3.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.01
  eps: 1.0e-8

scheduler:
  type: warmup_cosine
  warmup_steps: 30000         # 1% of total (longer warmup)
  min_lr: 1.0e-6
  cycle_mult: 1.0
  warmup_lr_start: 1.0e-6

validation:
  num_val_batches: 500
  metrics:
    - nll
    - ise
    - marginal_l1
    - marginal_l2
    - tail_weighted_ise
    - kendall_tau_error
    - total_mass_error
  
  family_breakdown: true
  families:
    - gaussian
    - student
    - clayton
    - gumbel
    - frank
    - joe
    - bb1
    - bb7
    - mixture_2comp
    - mixture_3comp
    - vine_conditional

checkpoint:
  dir: checkpoints/universal_copula_4gpu
  keep_last_n: 10
  keep_best_n: 5
  auto_resume: true
  save_optimizer: true
  save_ema: true

wandb:
  enabled: true
  project: vine-copula-universal
  entity: null
  run_name: null
  run_id: null
  tags:
    - comprehensive
    - 50M-params
    - 42M-samples
    - mixtures
    - 4gpus
  notes: "Universal copula estimator trained on 4 GPUs (budget option)"
  
  log_model: false
  watch_model: false
  log_every: 100
  log_images: true
  log_images_every: 10000
  num_log_images: 16
  sweep: false

distributed:
  backend: nccl
  find_unused_parameters: false
  gradient_as_bucket_view: true
  use_fsdp: false
  sharding_strategy: null

seed: 42
deterministic: false

performance:
  cudnn_benchmark: true
  tf32: true
  channels_last: false
  compile_model: false

hardware:
  num_gpus: 4                 # 4 GPUs total
  num_nodes: 1                # Single node
  gpus_per_node: 4
  cpus_per_gpu: 16
  gpu_type: h100

resources:
  gpu_memory_per_device: ~9 GB
  training_time: ~24 days      # 4× slower than 16 GPUs
  storage: ~4.5 TB
  cost_estimate: $14,592       # AWS (or $0 if using existing allocation)
