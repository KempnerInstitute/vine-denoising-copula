# Boundary-focused diffusion training configuration
# Based on the successful "good run" (validate_no_probit_diffusion_m128.yaml)
# with increased emphasis on tail regions for better boundary fitting

data:
  m: 128
  binning: uniform  # Keep uniform grid like the good run
  n_samples_per_copula: 5000
  copula_families:
    - gaussian
    - clayton
    - gumbel
    - frank
  num_workers: 4

model:
  in_channels: 1
  base_channels: 128
  channel_mults: [1, 2, 4]
  num_res_blocks: 2
  attention_resolutions: []
  dropout: 0.1
  time_emb_dim: 256
  use_coordinates: true
  transform_to_probit_space: false

diffusion:
  timesteps: 1000
  noise_schedule: linear

training:
  batch_size: 16
  max_steps: 10000  # Extended for better boundary convergence
  learning_rate: 0.0003
  weight_decay: 0.0001
  max_grad_norm: 1.0
  use_amp: false  # Match good run
  projection_iters: 15
  detach_projection: true  # Match good run
  
  # Logging and checkpointing
  log_interval: 100
  save_interval: 1000
  viz_interval: 1000
  
  # Loss weights - BOUNDARY FOCUSED
  loss_weights:
    ce: 1.0
    ise: 0.5
    tail: 2.0      # INCREASED from 0.5 to 2.0 for boundary emphasis
    ms: 0.0
    marg_kl: 0.01
  
  # Tail region configuration
  tail_tau: 0.15  # Standard 15% boundary region
  
  # Tail curriculum - gradual ramp for stability
  tail_curriculum:
    enable: true
    start_step: 0
    end_step: 3000   # Ramp tail weight over first 3k steps
    start_weight: 0.5
    end_weight: 2.0
  
  # Projection ramping (match good run)
  projection_ramp:
    enable: true
    ramp_steps: 2000
    min_iters: 2
    max_iters: 15
  
  # Multi-scale losses disabled to focus on primary resolution
  multi_scale:
    enable: false
  
  # Uncertainty weighting (match good run)
  uncertainty_weighting:
    enable: true
    warmup_steps: 1000
  
  # Adaptive projection (match good run)
  adaptive_projection:
    enable: true
    target_row_dev: 0.05
    target_col_dev: 0.05
    min_iters: 5
    max_iters: 30
  
  # Early stopping
  early_stopping:
    enable: true
    patience: 2000
    min_delta: 0.0001
    metric: loss

checkpoint_dir: checkpoints/diffusion_boundary_m128

