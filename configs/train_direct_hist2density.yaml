# Direct Histogram-to-Density Prediction Configuration
# 
# This is NOT a diffusion model. Instead, it's a direct regression model:
# - Input: 2D histogram from samples
# - Output: Copula log-density
# 
# This approach is simpler and faster than diffusion, and directly optimizes
# for density accuracy. Good for vine copula integration where speed matters.
#

model:
  type: direct_unet  # Not diffusion - direct prediction
  m: 64
  in_channels: 1   # Just histogram
  out_channels: 1  # Log-density output
  base_channels: 64
  channel_mults: [1, 2, 4, 8]
  num_res_blocks: 3
  attention_resolutions: [16, 8, 4]
  dropout: 0.1
  use_coordinates: true  # Add coordinate channels for position awareness

data:
  mode: online_generation
  m: 64
  n_samples_per_copula: 2000
  batch_size: 64
  num_workers: 4
  prefetch_factor: 2
  transform_to_probit_space: false
  copula_families:
    single:
      gaussian: 0.2
      clayton: 0.2
      gumbel: 0.2
      frank: 0.15
      joe: 0.15
      student: 0.1
    mixture:
      enabled: true
      prob: 0.2
      n_components: [2, 3]
  param_ranges:
    gaussian_rho: [-0.9, 0.9]
    clayton_theta: [0.5, 10.0]
    gumbel_theta: [1.0, 10.0]
    frank_theta: [-10.0, 10.0]
    joe_theta: [1.0, 10.0]
    student_rho: [-0.9, 0.9]
    student_nu: [3.0, 20.0]
  rotation_prob: 0.25

training:
  max_steps: 50000
  learning_rate: 0.0001
  weight_decay: 0.0001
  batch_size: 64
  use_amp: true
  gradient_clip: 1.0
  log_every: 100
  save_every: 5000
  visualize_every: 2000
  projection_iters: 15
  
  # Loss weights - directly optimize density accuracy
  loss_weights:
    ise: 1.0         # Primary: Integrated squared error
    log_ise: 0.5     # Log-space ISE for shape matching
    marginal: 0.2    # Marginal uniformity
    tail: 0.3        # Tail accuracy
    nll: 0.1         # Negative log-likelihood

checkpoint_dir: checkpoints/direct_hist2density

