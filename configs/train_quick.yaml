# Quick training configuration for testing/debugging
# Smaller model, less data, faster iterations

model:
  m: 32                    # Smaller grid
  in_channels: 1
  base_channels: 64        # Fewer channels
  num_res_blocks: 2
  attention_resolutions:
    - 8
  dropout: 0.0

data:
  train_root: "/path/to/train/data"  # UPDATE THIS
  val_root: "/path/to/val/data"      # UPDATE THIS
  batch_size: 32
  val_batch_size: 64
  num_workers: 4
  train_frac: 0.85
  val_frac: 0.10
  seed: 42
  reflect: true
  smooth_sigma: null
  cache_size: 100
  augment: true
  shuffle_buffer_size: 500
  infinite: true

optimizer:
  type: "adamw"
  lr: 1.0e-3               # Higher LR for quick test
  betas: [0.9, 0.999]
  weight_decay: 0.01

scheduler:
  type: "warmup_cosine"
  warmup_steps: 1000
  total_steps: 50000

training:
  max_steps: 50000         # Shorter training
  grad_accum_steps: 1
  use_amp: true
  max_grad_norm: 1.0
  
  loss_weights:
    nll: 1.0
    ise: 1.0
    marginal: 0.1
    tail: 0.5
  
  projection_iters: 15
  log_every: 50
  val_every: 2000
  save_every: 5000
  num_val_batches: 50

checkpoint_dir: "checkpoints/quick_test"
log_dir: "logs/quick_test"
auto_resume: true

use_wandb: false
