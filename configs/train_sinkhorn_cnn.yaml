# Training configuration for Enhanced CNN with Sinkhorn projection
# Uses entropy-regularized optimal transport for smoother gradients

model:
  type: "enhanced_cnn"
  m: 128  # Reduced from 256 for better memory efficiency
  use_coordinates: true
  use_probit_coords: false
  use_antialiased_hist: true
  use_residual: true
  use_batchnorm: true
  dropout_rate: 0.1

training:
  batch_size: 64
  num_epochs: 200
  # Unified trainer expects max_steps; approximate 200 epochs worth of steps.
  # For fair comparison with diffusion, cap at ~30k steps.
  max_steps: 30000
  learning_rate: 5.0e-6
  weight_decay: 1.0e-5
  gradient_clip: 0.5
  
  # Sinkhorn projection (entropy-regularized, smoother gradients)
  projection_method: "sinkhorn"
  projection_iters: 20  # Sinkhorn typically needs more iterations
  skip_projection: false
  
  # No detachment - allow gradients to flow through projection
  detach_projection: false
  
  # Loss configuration
  loss_type: "ise"
  
  # Marginal constraint regularization (backup constraint enforcement)
  marginal_kl_weight: 0.1
  loss_weights:
    ce: 1.0
    ise: 0.5
    tail: 0.25
    ms: 0.0
    marg_kl: 0.1
  
  # Logging
  log_interval: 100
  val_interval: 1000
  checkpoint_interval: 5000

data:
  m: 128
  binning: probit
  n_samples_per_copula: 8000
  num_workers: 8
  copula_families:
    gaussian: 0.18
    clayton: 0.22
    gumbel: 0.22
    frank: 0.12
    joe: 0.16
    student: 0.10

optimizer:
  name: "adamw"
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  name: "cosine"
  warmup_steps: 1000
  min_lr: 1.0e-7

wandb:
  project: "vine-diffusion-copula"
  name: "sinkhorn_cnn_m128"
  tags: ["enhanced_cnn", "sinkhorn", "m128", "gradient_fix"]
