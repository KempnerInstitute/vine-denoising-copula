# Conditional Diffusion V2 - Fixed Conditioning Collapse
#
# Key fixes:
# 1. Classifier-Free Guidance (CFG): Drop histogram 15% of time during training
# 2. Anti-copying loss: Penalize when output correlates more with histogram than true density
# 3. Stronger smoothness (TV) loss
# 4. CFG-guided inference
#

model:
  type: diffusion_unet
  m: 64
  in_channels: 2  # [noisy_log_density, histogram]
  base_channels: 64
  channel_mults: [1, 2, 3, 4]
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  dropout: 0.1

diffusion:
  timesteps: 1000
  noise_schedule: cosine
  beta_start: 0.0001
  beta_end: 0.02

data:
  mode: online_generation
  m: 64
  n_samples_per_copula: 2000
  batch_size: 32
  num_workers: 4
  prefetch_factor: 2
  copula_families:
    single:
      gaussian: 0.20
      clayton: 0.20
      gumbel: 0.20
      frank: 0.15
      joe: 0.15
      student: 0.10
    mixture:
      enabled: true
      prob: 0.2
      n_components: [2, 3]
  param_ranges:
    gaussian_rho: [-0.9, 0.9]
    clayton_theta: [0.5, 10.0]
    gumbel_theta: [1.0, 10.0]
    frank_theta: [-10.0, 10.0]
    joe_theta: [1.0, 10.0]
    student_rho: [-0.9, 0.9]
    student_nu: [3.0, 20.0]
  rotation_prob: 0.25

training:
  max_steps: 200000  # Longer training
  learning_rate: 0.0001
  weight_decay: 0.0001
  batch_size: 32
  use_amp: true
  gradient_clip: 1.0
  log_every: 100
  save_every: 10000
  visualize_every: 5000
  steps_per_epoch: 1000
  
  # KEY FIX: Classifier-Free Guidance dropout
  cfg_dropout_prob: 0.15  # Drop histogram 15% of time
  
  # Loss weights - tuned for preventing histogram copying
  loss_weights:
    noise: 1.0       # Primary diffusion loss
    ise: 0.5         # Integrated squared error
    marginal: 0.1    # Marginal uniformity
    log: 0.3         # Log-space magnitude matching
    tail: 0.3        # Tail regions (corners)
    tv: 0.1          # Smoothness (total variation)
    anticopy: 0.5    # KEY FIX: Anti-copying loss

checkpoint_dir: checkpoints/conditional_diffusion_v2

