# =============================================================================
# Histogram-Conditioned Diffusion (iterative DDIM inference)
# High-res grid (m=128) + smoothness regularization
# =============================================================================
experiment:
  name: "copula_diffusion_cond_m128_smooth"
  description: "Conditional diffusion UNet at m=128 with multi-scale + TV(log) regularization for smoother copula densities"
  seed: 42

model:
  type: "diffusion_unet"
  grid_size: 128
  # 2 channels: [x_t (noisy log-density), log_histogram (conditioning)]
  in_channels: 2
  base_channels: 64
  channel_mults: [1, 2, 3, 4]
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  dropout: 0.1
  time_emb_dim: 256

diffusion:
  timesteps: 1000
  noise_schedule: "cosine"
  # Inference defaults (used by evaluation/plotting).
  sampling_steps: 200
  cfg_scale: 4.0

data:
  m: 128
  n_samples_per_copula:
    mode: "log_uniform"
    min: 200
    max: 5000
  copula_families: ["gaussian", "student", "clayton", "gumbel", "frank", "joe", "independence"]
  binning: "uniform"
  num_workers: 4
  mixture_prob: 0.30
  n_mixture_components: [2, 4]

  # Parameter ranges (explicit + reproducible)
  param_ranges:
    gaussian_rho: [-0.95, 0.95]
    student_rho: [-0.9, 0.9]
    student_df: [2, 30]
    clayton_theta: [0.1, 10.0]
    gumbel_theta: [1.1, 8.0]
    frank_theta: [-15.0, 15.0]
    joe_theta: [1.1, 8.0]

training:
  # NOTE: batch_size is PER GPU (DDP). With 4 GPUs this yields global batch 32.
  max_steps: 150000
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  gradient_clip: 1.0

  # Classifier-free dropout probability for training conditional diffusion
  cfg_dropout_prob: 0.10

  # Optional: smooth the conditioning histogram (augmentation) to reduce sensitivity
  # to bin-level speckle at high resolution. Set to 0 to disable.
  cond_hist_smooth_sigma: 0.60
  cond_hist_smooth_random: true

  # Loss suite on projected density (in addition to diffusion noise MSE)
  loss_weights:
    ce: 1.0
    ise: 0.0
    tail: 0.1
    # Multi-scale downsampled losses help reduce high-frequency artifacts.
    ms: 0.15
    marg_kl: 0.0
    # New: smoothness prior (total variation). Recommended: 1e-3–5e-2.
    tv: 0.01

  # New: apply TV in log-density space (better for peaked copulas).
  tv_in_log_space: true

  # Multi-scale config (used when loss_weights.ms > 0)
  multi_scale:
    enable: true
    scales: [2, 4, 8]
    ce_weight: 0.5
    ise_weight: 0.25

  projection_iters: 30
  detach_projection: false
  skip_projection: false
  use_amp: true

  log_every: 100
  save_every: 10000
  viz_every: 5000

output:
  base_dir: "results"
  checkpoint_dir: "checkpoints"
  include_timestamp: true
  include_job_id: true

hardware:
  device: "cuda"
  mixed_precision: true

