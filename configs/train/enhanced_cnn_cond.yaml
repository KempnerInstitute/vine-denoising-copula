# =============================================================================
# Strong non-diffusion baseline: Enhanced CNN (histogram -> density)
# =============================================================================
experiment:
  name: "copula_enhanced_cnn"
  description: "Enhanced CNN baseline: (histogram) -> density"
  seed: 42

model:
  type: "enhanced_cnn"
  grid_size: 64
  base_channels: 128
  n_blocks: 3
  dropout: 0.1
  output_mode: "log"

  use_coordinates: true
  use_probit_coords: true
  time_conditioning: false
  time_emb_dim: 256

data:
  m: 64
  n_samples_per_copula: 1000
  copula_families: ["gaussian", "student", "clayton", "gumbel", "frank", "joe", "independence"]
  binning: "uniform"
  num_workers: 4

  param_ranges:
    gaussian_rho: [-0.95, 0.95]
    student_rho: [-0.9, 0.9]
    student_df: [2, 30]
    clayton_theta: [0.1, 10.0]
    gumbel_theta: [1.1, 8.0]
    frank_theta: [-15.0, 15.0]
    joe_theta: [1.1, 8.0]

training:
  max_steps: 150000
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 0.01
  gradient_clip: 1.0

  loss_weights:
    ce: 1.0
    ise: 0.0
    tail: 0.1
    ms: 0.0
    marg_kl: 0.0

  projection_iters: 30
  detach_projection: false
  skip_projection: false
  use_amp: true

  log_every: 100
  save_every: 10000
  viz_every: 5000

output:
  base_dir: "results"
  checkpoint_dir: "checkpoints"
  include_timestamp: true
  include_job_id: true

hardware:
  device: "cuda"
  mixed_precision: true

