# =============================================================================
# Noise-Conditioned Single-Pass Denoiser (one forward pass at t=0)
# + Complex synthetic copulas (X / ring / double-banana)
# =============================================================================
experiment:
  name: "copula_denoiser_cond_complex"
  description: "Denoiser: (histogram, noise_level) -> density, trained on parametric + complex synthetic copulas"
  seed: 42

model:
  type: "denoiser"
  grid_size: 64
  base_channels: 128
  depth: 4
  blocks_per_level: 2
  dropout: 0.1
  time_emb_dim: 256

  # Conditioning helpers
  use_coordinates: true
  use_probit_coords: true
  use_log_n: true
  time_conditioning: true
  output_mode: "log"
  transform_to_probit_space: false

data:
  m: 64
  n_samples_per_copula:
    mode: "log_uniform"
    min: 200
    max: 5000

  # Weighted family mix. Complex entries are handled by vdc/data/onthefly.py.
  copula_families:
    gaussian: 0.18
    student: 0.08
    clayton: 0.12
    gumbel: 0.12
    frank: 0.08
    joe: 0.08
    independence: 0.04
    complex_x: 0.10
    complex_ring: 0.10
    complex_double_banana: 0.10

  binning: "uniform"
  num_workers: 4

  # Mixture augmentation (parametric mixtures; complex families are excluded from mixture sampling)
  mixture_prob: 0.30
  n_mixture_components: [2, 4]

  param_ranges:
    gaussian_rho: [-0.95, 0.95]
    student_rho: [-0.9, 0.9]
    student_df: [2, 30]
    clayton_theta: [0.1, 10.0]
    gumbel_theta: [1.1, 8.0]
    frank_theta: [-15.0, 15.0]
    joe_theta: [1.1, 8.0]

training:
  max_steps: 200000
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 0.01
  gradient_clip: 1.0

  hist_noise:
    enable: true
    max_strength: 0.75
    power: 1.0

  loss_weights:
    ce: 1.0
    ise: 0.0
    tail: 0.1
    ms: 0.0
    marg_kl: 0.0

  projection_iters: 30
  detach_projection: false
  skip_projection: false
  use_amp: true

  log_every: 100
  save_every: 10000
  viz_every: 5000

output:
  base_dir: "results"
  checkpoint_dir: "checkpoints"
  include_timestamp: true
  include_job_id: true

hardware:
  device: "cuda"
  mixed_precision: true

