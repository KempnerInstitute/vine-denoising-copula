# Comprehensive training configuration for universal copula network
# Designed for 42M samples covering all families + mixtures
# Target: Train once, use everywhere

model:
  m: 64                      # Grid resolution (64×64 = 4096 density values)
  in_channels: 1             # Histogram input
  base_channels: 128         # → ~50M parameters
  channel_mults: [1, 2, 3, 4]
  num_res_blocks: 3          # Residual blocks per resolution
  attention_resolutions:     # Self-attention at these resolutions
    - 16
    - 8
  dropout: 0.1
  time_emb_dim: 256

# Data generation configuration
data:
  mode: online_generation     # Generate on-the-fly (saves 4.2 TB storage!)
                              # Alternative: pregenerated (load from disk)
  
  # On-the-fly generation parameters
  families:                   # Copula families to generate
    - gaussian
    - student
    - clayton
    - gumbel
    - frank
    - joe
    - bb1
    - bb6
    - bb7
    - bb8
  
  # Mixture composition (probabilities sum to 1.0)
  mixture_probs:
    single: 0.70              # 70% single-family copulas
    mixture_2: 0.15           # 15% 2-component mixtures
    mixture_3: 0.10           # 10% 3-component mixtures
    mixture_4_5: 0.05         # 5% 4-5 component mixtures
  
  tau_range: [-0.9, 0.9]      # Range of Kendall's tau
  include_rotations: true     # Include 0°, 90°, 180°, 270° rotations
  n_samples_per_copula: 1000  # Samples to generate per copula
  
  # Validation: use small pre-generated set for consistency
  val_root: data/val          # Optional: for consistent metrics
  val_mode: pregenerated      # Load validation from disk
  
  batch_size: 128             # Per GPU (with gradient checkpointing)
  val_batch_size: 256         # Larger for validation
  num_workers: 8              # Data loading workers per GPU (8 × 16 GPUs = 128 total)
                              # Each worker generates 16 samples in ~352ms (parallel)
  
  # Data augmentation and processing
  reflect: true               # Reflection padding for histograms
  smooth_sigma: null          # No smoothing (preserve sharp features)
  shuffle_buffer_size: 5000   # Large shuffle buffer for diversity
  cache_size: 1000            # Cache samples in memory
  prefetch_factor: 4          # Prefetch batches
  pin_memory: true            # Pin memory for faster GPU transfer
  persistent_workers: true    # Keep workers alive
  infinite: true              # Infinite streaming (no epoch boundaries)

# Diffusion process
diffusion:
  timesteps: 1000             # Diffusion steps
  beta_schedule: cosine       # Cosine schedule (better than linear)
  beta_start: 1.0e-4
  beta_end: 0.02
  prediction_type: noise      # Predict noise (v-prediction also possible)

# Training configuration
training:
  max_steps: 375000           # ~36 epochs over 42M samples (halved due to 2× batch)
  grad_accum_steps: 2         # Gradient accumulation
                              # Effective batch = 128 * 2 * 16 GPUs = 4096
  use_gradient_checkpointing: true  # Required for batch=128
  
  use_amp: true               # Mixed precision (FP16)
  amp_dtype: float16          # Use FP16 (bfloat16 also possible on H100)
  max_grad_norm: 1.0          # Gradient clipping
  
  # Loss function weights
  loss_weights:
    nll: 1.0                  # Negative log-likelihood (primary)
    ise: 1.0                  # Integrated squared error (grid smoothness)
    marginal: 0.15            # Marginal uniformity (stronger than default)
    tail: 0.5                 # Tail behavior (weighted ISE in tails)
    mixture_kl: 0.1           # KL divergence for mixture components
    density_reg: 0.01         # Small regularization on density values
  
  # Copula projection (IPFP/Sinkhorn)
  projection_iters: 20        # Iterations for IPFP
  projection_tol: 1.0e-4      # Convergence tolerance
  projection_schedule:        # Anneal projection strength
    start_step: 0
    end_step: 100000
    start_weight: 0.5         # Start with weak projection
    end_weight: 1.0           # Full projection after 100k steps
  
  # Logging and monitoring
  log_every: 100              # Log metrics every N steps
  val_every: 5000             # Validate every N steps
  save_every: 10000           # Save checkpoint every N steps
  
  # EMA for stable inference
  use_ema: true
  ema_decay: 0.9999           # Exponential moving average of weights

# Optimizer
optimizer:
  type: adamw                 # AdamW optimizer
  lr: 3.0e-4                  # Learning rate
  betas: [0.9, 0.999]         # Adam betas
  weight_decay: 0.01          # Weight decay (L2 regularization)
  eps: 1.0e-8                 # Numerical stability

# Learning rate scheduler
scheduler:
  type: warmup_cosine         # Warmup + cosine annealing
  warmup_steps: 15000         # 2% of total steps (linear warmup)
  min_lr: 1.0e-6              # Minimum learning rate
  cycle_mult: 1.0             # No cycle restart
  warmup_lr_start: 1.0e-6     # Starting LR for warmup

# Validation
validation:
  num_val_batches: 500        # Number of batches per validation
  metrics:                    # Metrics to compute
    - nll                     # Negative log-likelihood
    - ise                     # Integrated squared error
    - marginal_l1             # L1 error in marginals
    - marginal_l2             # L2 error in marginals
    - tail_weighted_ise       # ISE weighted by tail regions
    - kendall_tau_error       # Kendall's tau preservation
    - total_mass_error        # |∫∫c(u,v)dudv - 1|
  
  # Per-family validation (track performance by copula type)
  family_breakdown: true
  families:
    - gaussian
    - student
    - clayton
    - gumbel
    - frank
    - joe
    - bb1
    - bb7
    - mixture_2comp
    - mixture_3comp
    - vine_conditional

# Checkpointing
checkpoint:
  dir: checkpoints/universal_copula
  keep_last_n: 10             # Keep last 10 checkpoints
  keep_best_n: 5              # Keep 5 best (by val NLL)
  auto_resume: true           # Automatically resume from latest
  save_optimizer: true        # Save optimizer state
  save_ema: true              # Save EMA weights

# Weights & Biases logging
wandb:
  enabled: true
  project: vine-copula-universal
  entity: null                # Set your W&B entity
  run_name: null              # Auto-generated if null
  run_id: null                # For resumption
  tags:
    - comprehensive
    - 50M-params
    - 42M-samples
    - mixtures
    - production
  notes: "Universal copula estimator: train once, use everywhere"
  
  # Logging configuration
  log_model: false            # Don't upload model to W&B (too large)
  watch_model: false          # Don't watch gradients (expensive)
  log_every: 100
  
  # What to log
  log_images: true            # Log sample reconstructions
  log_images_every: 5000      # Every N steps
  num_log_images: 16          # Number of images to log
  
  # Hyperparameter sweep support
  sweep: false

# Distributed training
distributed:
  backend: nccl               # NCCL backend for multi-GPU
  find_unused_parameters: false
  gradient_as_bucket_view: true  # Memory optimization
  
  # Sharding (optional, for very large models)
  use_fsdp: false             # Fully Sharded Data Parallel
  sharding_strategy: null     # FULL_SHARD, SHARD_GRAD_OP, etc.

# Reproducibility
seed: 42
deterministic: false          # Set true for full reproducibility (slower)

# Performance optimizations
performance:
  cudnn_benchmark: true       # cuDNN autotuning
  tf32: true                  # TF32 on Ampere/Hopper (faster matmul)
  channels_last: false        # Memory layout (try true for H100)
  compile_model: false        # torch.compile (PyTorch 2.0+, experimental)

# Hardware-specific
hardware:
  num_gpus: 16                # Total number of GPUs
  num_nodes: 2                # Number of nodes
  gpus_per_node: 8            # GPUs per node
  cpus_per_gpu: 16            # CPU cores per GPU
  gpu_type: h100              # For documentation

# Expected resources
resources:
  gpu_memory_per_device: ~22 GB  # With batch=128 + checkpointing (27% of 80GB)
  cpu_cores_per_node: 128        # Need 128 cores for on-the-fly generation (8 per GPU)
  training_time: ~50 hours       # 2× faster with batch=128 (was ~90 hours)
  storage: ~50 GB                # Checkpoints only (no data storage with on-the-fly!)
  storage_saved: ~4.2 TB         # Saved by using on-the-fly generation
  cost_estimate: ~$10k           # AWS p5.48xlarge (50 hrs × 2 nodes × $98.32/hr)
  cost_saved: ~$3,600/year       # Storage costs saved ($336/month × 12 - implementation)
