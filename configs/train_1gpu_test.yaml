# Training configuration for 1 GPU with reduced dataset (testing/development)
# Quick training for debugging and paper experiments

model:
  m: 64
  in_channels: 1
  base_channels: 128         # Same architecture
  channel_mults: [1, 2, 3, 4]
  num_res_blocks: 3
  attention_resolutions: [16, 8]
  dropout: 0.1
  time_emb_dim: 256

data:
  train_roots:
    - data/train/single_family
    - data/train/mixtures_2comp
    - data/train/mixtures_3comp
    - data/train/mixtures_4_5comp
    - data/train/vine_cond_3d
    - data/train/vine_cond_5d
    - data/train/hard_examples
  
  # Use only 1% of each dataset (420k total samples)
  sample_fraction: 0.01       # Subsample each source
  sample_weights: [0.05, 0.15, 0.30, 0.15, 0.15, 0.10, 0.10]
  val_root: data/val
  
  batch_size: 64              # Per GPU
  val_batch_size: 128
  num_workers: 4              # Fewer workers for single GPU
  
  reflect: true
  smooth_sigma: null
  shuffle_buffer_size: 1000   # Smaller buffer
  cache_size: 200
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: true
  infinite: true

diffusion:
  timesteps: 1000
  beta_schedule: cosine
  beta_start: 1.0e-4
  beta_end: 0.02
  prediction_type: noise

training:
  max_steps: 10000            # Quick training (1-2 hours)
  grad_accum_steps: 4         # Simulate larger batch
                              # Effective batch: 64 × 1 × 4 = 256
  
  use_amp: true
  amp_dtype: float16
  max_grad_norm: 1.0
  
  loss_weights:
    nll: 1.0
    ise: 1.0
    marginal: 0.15
    tail: 0.5
    mixture_kl: 0.1
    density_reg: 0.01
  
  projection_iters: 20
  projection_tol: 1.0e-4
  projection_schedule:
    start_step: 0
    end_step: 2000
    start_weight: 0.5
    end_weight: 1.0
  
  log_every: 50               # More frequent logging
  val_every: 500              # Frequent validation
  save_every: 1000
  
  use_ema: true
  ema_decay: 0.9999

optimizer:
  type: adamw
  lr: 3.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.01
  eps: 1.0e-8

scheduler:
  type: warmup_cosine
  warmup_steps: 500           # 5% warmup
  min_lr: 1.0e-6
  cycle_mult: 1.0
  warmup_lr_start: 1.0e-6

validation:
  num_val_batches: 100        # Fewer validation batches
  metrics:
    - nll
    - ise
    - marginal_l1
    - kendall_tau_error
  
  family_breakdown: true
  families:
    - gaussian
    - clayton
    - gumbel
    - mixture_2comp
    - mixture_3comp

checkpoint:
  dir: checkpoints/test_1gpu
  keep_last_n: 5
  keep_best_n: 3
  auto_resume: true
  save_optimizer: true
  save_ema: true

wandb:
  enabled: true
  project: vine-copula-dev
  entity: null
  run_name: test_1gpu
  run_id: null
  tags:
    - test
    - 1gpu
    - reduced-dataset
  notes: "Quick test training on 1 GPU with 1% of data"
  
  log_model: false
  watch_model: false
  log_every: 50
  log_images: true
  log_images_every: 500
  num_log_images: 8
  sweep: false

distributed:
  backend: nccl
  find_unused_parameters: false
  gradient_as_bucket_view: true
  use_fsdp: false

seed: 42
deterministic: false

performance:
  cudnn_benchmark: true
  tf32: true
  channels_last: false
  compile_model: false

hardware:
  num_gpus: 1                 # Single GPU
  num_nodes: 1
  gpus_per_node: 1
  cpus_per_gpu: 8
  gpu_type: h100              # or A100, V100

resources:
  gpu_memory_per_device: ~9 GB
  training_time: ~2 hours      # Quick test
  storage: ~50 GB              # Only 1% of data
  cost_estimate: ~$5           # AWS
