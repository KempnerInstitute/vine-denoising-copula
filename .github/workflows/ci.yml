name: CI

on:
  push:
    branches:
      - dev
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run Ruff on maintained paths
        run: |
          ruff check \
            vdc/pretrained.py \
            vdc/utils/ipfp_log.py \
            vdc/utils/probit_transform.py \
            scripts/build_docs_site.py \
            scripts/download_pretrained.py \
            scripts/package_pretrained_model.py \
            scripts/upload_pretrained_to_hf.py \
            scripts/verify_pretrained_release.py \
            examples/use_pretrained_model.py \
            tests/test_information_metrics.py \
            tests/test_pretrained.py \
            tests/test_ipfp_log.py \
            tests/test_probit_transform.py \
            tests/test_hfunc_independence_accuracy.py

  smoke-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy scipy
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install --no-deps -e .

      - name: Run smoke tests
        run: |
          python -m pytest tests/test_information_metrics.py -q
          python -m pytest tests/test_pretrained.py -q
          python -m pytest tests/test_ipfp_log.py -q
          python -m pytest tests/test_probit_transform.py -q
          python -m pytest tests/test_hfunc_independence_accuracy.py -q
